name: Build-Push-Deploy

on:
  push:
    branches:
      - main

jobs:
  build_push_deploy:

    runs-on: ubuntu-latest

    steps:

      # Checkout Source Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build Maven Project
      - name: Build with Maven
        run: mvn clean package

      # DockerHub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest .

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

      # Deploy to EC2 Server
      - name: Deploy Application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Stop old container
            docker stop javaapp || true

            # Remove old container
            docker rm javaapp || true

            # Remove old image
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest || true

            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            # Run latest container
            docker run -d \
            --name javaapp \
            -p 8080:8080 \
            ${{ secrets.DOCKERHUB_USERNAME }}/java-docker-app:latest

            # Show running containers
            docker ps
